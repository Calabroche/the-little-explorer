name: Sync Strava activities

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron runs in UTC. Note: cron schedules
    # on Hobby repos can be delayed during peak hours, so the real cadence is
    # closer to "20-30 minutes most of the time".
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      # Optional — passed by /api/strava-webhook so the run logs can show
      # which athlete triggered it. Cron and manual UI dispatches omit it.
      strava_owner_id:
        description: 'Strava athlete id that triggered this sync (webhook only)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # Reads athletes from next_auth.accounts and writes activities + streams to
  # public.activities. Covers everyone who connected Strava through the
  # production app's OAuth flow. This is the only sync path: the old per-user
  # JSON matrix (florian/helena, env-var refresh tokens) was retired once the
  # OAuth flow took over — its refresh tokens had gone stale and it synced
  # nobody. If a legacy user is missing here, reconnect Strava in the app.
  sync-supabase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Sync all Supabase-linked athletes
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRAVA_CLIENT_ID:          ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET:      ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_SERVICE_ROLE_KEY" ]]; then
            echo "Supabase secrets missing — skipping multi-user sync."
            exit 0
          fi
          node scripts/sync-strava-supabase.mjs
